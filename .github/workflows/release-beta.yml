name: Release Beta

on:
  push:
    branches: [ dev ]

jobs:
  release-beta:
    # Skip version-bump commits to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, 'chore: bump version to')"
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: dev
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore Rhombus.WinFormsMcp.sln

    - name: Build
      run: dotnet build Rhombus.WinFormsMcp.sln --configuration Release --no-restore

    - name: Build RendererHost (multi-target)
      run: dotnet build src/Rhombus.WinFormsMcp.RendererHost/Rhombus.WinFormsMcp.RendererHost.csproj --configuration Release --no-restore

    - name: Run tests
      run: dotnet test Rhombus.WinFormsMcp.sln --configuration Release --no-build --logger "console;verbosity=detailed"

    - name: Analyze commits for version bump
      id: bump-type
      shell: pwsh
      run: |
        $commits = git log --oneline --no-merges origin/master..HEAD 2>$null
        Write-Host "Commits since master:`n$commits"

        $bumpType = "patch"
        foreach ($line in ($commits -split "`n")) {
          if ($line -match 'BREAKING CHANGE:') {
            $bumpType = "major"
            break
          }
          if ($line -match '^\w+ feat:') {
            $bumpType = "minor"
          }
        }

        Write-Host "Version bump type: $bumpType"
        echo "bump_type=$bumpType" >> $env:GITHUB_OUTPUT

    - name: Bump version
      id: bump
      shell: pwsh
      run: |
        # Read current version
        $version = (Get-Content VERSION).Trim()
        Write-Host "Current version: $version"

        # Remove -beta suffix if present
        $version = $version -replace '-beta$', ''

        # Parse version
        $parts = $version.Split('.')
        $major = [int]$parts[0]
        $minor = [int]$parts[1]
        $patch = [int]$parts[2]

        # Bump based on type
        $bumpType = "${{ steps.bump-type.outputs.bump_type }}"
        switch ($bumpType) {
          "major" {
            $major++
            $minor = 0
            $patch = 0
          }
          "minor" {
            $minor++
            $patch = 0
          }
          "patch" {
            $patch++
          }
        }

        # Create new version with beta suffix
        $newVersion = "$major.$minor.$patch-beta"
        Write-Host "New version: $newVersion"

        # Write to VERSION file
        $newVersion | Out-File -FilePath VERSION -NoNewline -Encoding utf8

        # Update npm package.json
        $packageJson = Get-Content npm/package.json | ConvertFrom-Json
        $packageJson.version = $newVersion
        $packageJson | ConvertTo-Json -Depth 10 | Out-File -FilePath npm/package.json -Encoding utf8

        # Update .csproj version
        $csprojPath = "src/Rhombus.WinFormsMcp.Server/Rhombus.WinFormsMcp.Server.csproj"
        $csproj = [xml](Get-Content $csprojPath)
        $versionNode = $csproj.SelectSingleNode("//PropertyGroup/Version")
        if ($versionNode) {
          $versionNode.InnerText = $newVersion
          $csproj.Save($csprojPath)
        }

        echo "new_version=$newVersion" >> $env:GITHUB_OUTPUT
        echo "bump_type=$bumpType" >> $env:GITHUB_OUTPUT

    - name: Commit version bump
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add VERSION npm/package.json src/Rhombus.WinFormsMcp.Server/Rhombus.WinFormsMcp.Server.csproj
        git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} (${{ steps.bump.outputs.bump_type }})"
        git push

    - name: Create NuGet package
      run: dotnet pack src/Rhombus.WinFormsMcp.Server/Rhombus.WinFormsMcp.Server.csproj -c Release -p:Version=${{ steps.bump.outputs.new_version }}

    - name: Create NPM distribution
      shell: pwsh
      run: |
        $serverBin = "src/Rhombus.WinFormsMcp.Server/bin/Release/net8.0-windows"
        $hostBin   = "src/Rhombus.WinFormsMcp.RendererHost/bin/Release"

        # Stage server binaries
        New-Item -ItemType Directory -Path "npm/dist" -Force | Out-Null
        Copy-Item -Path "$serverBin/winformsmcp.exe" -Destination "npm/dist/" -Force
        Get-ChildItem -Path $serverBin -Filter "*.dll" | ForEach-Object {
          Copy-Item -Path $_.FullName -Destination "npm/dist/" -Force
        }

        # Stage RendererHost binaries (one subfolder per TFM)
        foreach ($tfm in @("net48", "netcoreapp3.1", "net8.0-windows")) {
          $src = "$hostBin/$tfm"
          $dest = "npm/dist/rendererhost/$tfm"
          if (Test-Path $src) {
            New-Item -ItemType Directory -Path $dest -Force | Out-Null
            Copy-Item -Path "$src/*" -Destination $dest -Recurse -Force
            Write-Host "Copied RendererHost/$tfm -> $dest"
          } else {
            Write-Warning "RendererHost build output not found: $src"
          }
        }

    - name: Publish beta to NPM
      run: |
        npm config set @fnrhombus:registry https://registry.npmjs.org/
        npm config set //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
        cd npm
        npm publish --access public --tag beta || echo "NPM publish failed or already exists, continuing..."
      if: env.NPM_TOKEN != ''
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      continue-on-error: true

    - name: NuGet login (OIDC)
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: butler.software

    - name: Publish beta to NuGet
      run: |
        $nupkg = Get-ChildItem -Path "src/Rhombus.WinFormsMcp.Server/bin/Release" -Filter "Rhombus.WinFormsMcp.${{ steps.bump.outputs.new_version }}.nupkg" | Select-Object -First 1
        if ($nupkg) {
          Write-Host "Publishing $($nupkg.Name) to NuGet with beta tag..."
          dotnet nuget push $nupkg.FullName --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        }
      shell: pwsh
