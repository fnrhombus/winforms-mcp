name: Release Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-2022
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extract and prepare version
      id: version
      shell: pwsh
      run: |
        # Read version from VERSION file
        $version = (Get-Content VERSION).Trim()
        Write-Host "Version from file: $version"

        # Remove -beta suffix for stable release
        $stableVersion = $version -replace '-beta$', ''
        Write-Host "Stable version: $stableVersion"

        # Update VERSION file
        $stableVersion | Out-File -FilePath VERSION -NoNewline -Encoding utf8

        # Update npm package.json
        $packageJson = Get-Content npm/package.json | ConvertFrom-Json
        $packageJson.version = $stableVersion
        $packageJson | ConvertTo-Json -Depth 10 | Out-File -FilePath npm/package.json -Encoding utf8

        # Update .csproj version
        $csprojPath = "src/Rhombus.WinFormsMcp.Server/Rhombus.WinFormsMcp.Server.csproj"
        $csproj = [xml](Get-Content $csprojPath)
        $versionNode = $csproj.SelectSingleNode("//PropertyGroup/Version")
        if ($versionNode) {
          $versionNode.InnerText = $stableVersion
          $csproj.Save($csprojPath)
        }

        echo "version=$stableVersion" >> $env:GITHUB_OUTPUT

    - name: Commit version update
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add VERSION npm/package.json src/Rhombus.WinFormsMcp.Server/Rhombus.WinFormsMcp.Server.csproj
        git diff --staged --quiet || git commit -m "chore: release version ${{ steps.version.outputs.version }}"
        git tag "v${{ steps.version.outputs.version }}"
        git push
        git push origin "v${{ steps.version.outputs.version }}"

    - name: Restore dependencies
      run: dotnet restore Rhombus.WinFormsMcp.sln

    - name: Build
      run: dotnet build Rhombus.WinFormsMcp.sln --configuration Release --no-restore

    - name: Build RendererHost (multi-target)
      run: dotnet build src/Rhombus.WinFormsMcp.RendererHost/Rhombus.WinFormsMcp.RendererHost.csproj --configuration Release --no-restore

    - name: Run tests
      run: dotnet test Rhombus.WinFormsMcp.sln --configuration Release --no-build --logger "console;verbosity=minimal"

    - name: Create NuGet package
      run: dotnet pack src/Rhombus.WinFormsMcp.Server/Rhombus.WinFormsMcp.Server.csproj -c Release -p:Version=${{ steps.version.outputs.version }}

    - name: Generate changelog
      id: changelog
      shell: pwsh
      run: |
        # Find the previous release tag (skip the tag we just created)
        $allTags = git tag --sort=-v:refname | Where-Object { $_ -match '^v\d' }
        $currentTag = "v${{ steps.version.outputs.version }}"
        $prevTag = ($allTags | Where-Object { $_ -ne $currentTag } | Select-Object -First 1)
        if (-not $prevTag) { $prevTag = (git rev-list --max-parents=0 HEAD) }
        Write-Host "Generating changelog from $prevTag to $currentTag"

        # Get commits grouped by conventional commit type (deduplicate by message to avoid merge duplication)
        $commits = git log "$prevTag..$currentTag" --pretty=format:"%s" --no-merges | Sort-Object -Unique | Where-Object { $_ }

        $features = @(); $fixes = @(); $docs = @(); $other = @()
        foreach ($msg in $commits) {
          if ($msg -match '^feat:') { $features += $msg -replace '^feat:\s*', '' }
          elseif ($msg -match '^fix:') { $fixes += $msg -replace '^fix:\s*', '' }
          elseif ($msg -match '^docs:') { $docs += $msg -replace '^docs:\s*', '' }
          elseif ($msg -notmatch '^chore: (release version|merge dev|bump version)') { $other += $msg }
        }

        $body = ""
        if ($features.Count -gt 0) {
          $body += "### Features`n"
          foreach ($f in $features) { $body += "- $f`n" }
          $body += "`n"
        }
        if ($fixes.Count -gt 0) {
          $body += "### Fixes`n"
          foreach ($f in $fixes) { $body += "- $f`n" }
          $body += "`n"
        }
        if ($docs.Count -gt 0) {
          $body += "### Docs`n"
          foreach ($f in $docs) { $body += "- $f`n" }
          $body += "`n"
        }
        if ($other.Count -gt 0) {
          $body += "### Other`n"
          foreach ($f in $other) { $body += "- $f`n" }
          $body += "`n"
        }

        if (-not $body) { $body = "Maintenance release.`n" }

        # Write to file for multi-line output
        $body | Out-File -FilePath changelog.md -Encoding utf8 -NoNewline
        Write-Host "Changelog:`n$body"

    - name: Create distribution
      id: dist
      shell: pwsh
      run: |
        $serverBin = "src/Rhombus.WinFormsMcp.Server/bin/Release/net8.0-windows"
        $hostBin   = "src/Rhombus.WinFormsMcp.RendererHost/bin/Release"
        $stagingDir = "dist-staging"

        # Stage server binaries
        New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
        Copy-Item -Path "$serverBin/winformsmcp.exe" -Destination "$stagingDir/" -Force
        Get-ChildItem -Path $serverBin -Filter "*.dll" | ForEach-Object {
          Copy-Item -Path $_.FullName -Destination "$stagingDir/" -Force
        }

        # Stage RendererHost binaries (one subfolder per TFM)
        foreach ($tfm in @("net48", "netcoreapp3.1", "net8.0-windows")) {
          $src = "$hostBin/$tfm"
          $dest = "$stagingDir/rendererhost/$tfm"
          if (Test-Path $src) {
            New-Item -ItemType Directory -Path $dest -Force | Out-Null
            Copy-Item -Path "$src/*" -Destination $dest -Recurse -Force
            Write-Host "Copied RendererHost/$tfm -> $dest"
          } else {
            Write-Warning "RendererHost build output not found: $src"
          }
        }

        # Create zip for GitHub Release
        $zipName = "winformsmcp-v${{ steps.version.outputs.version }}-win-x64.zip"
        Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipName -Force
        Write-Host "Created $zipName"
        echo "zip_path=$zipName" >> $env:GITHUB_OUTPUT

        # Copy staged files to npm/dist
        New-Item -ItemType Directory -Path "npm/dist" -Force | Out-Null
        Copy-Item -Path "$stagingDir/*" -Destination "npm/dist/" -Recurse -Force

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.version }}
        release_name: Release ${{ steps.version.outputs.version }}
        body_path: changelog.md
        draft: false
        prerelease: false

    - name: Upload release zip
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ steps.dist.outputs.zip_path }}
        asset_name: ${{ steps.dist.outputs.zip_path }}
        asset_content_type: application/zip

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Publish to NPM
      run: |
        cd npm
        npm publish --access public --provenance

    - name: NuGet login (OIDC)
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: butler.software

    - name: Publish to NuGet
      run: |
        $nupkg = Get-ChildItem -Path "src/Rhombus.WinFormsMcp.Server/bin/Release" -Filter "Rhombus.WinFormsMcp.${{ steps.version.outputs.version }}.nupkg" | Select-Object -First 1
        if ($nupkg) {
          Write-Host "Publishing $($nupkg.Name) to NuGet..."
          dotnet nuget push $nupkg.FullName --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        } else {
          throw "No .nupkg file found"
        }
      shell: pwsh
